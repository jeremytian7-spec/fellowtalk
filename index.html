<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博先知 · 团契智能讨论站</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Roboto,sans-serif;}
        body{min-height:100vh;background:#080c1a;background-image:radial-gradient(circle at 20% 30%,rgba(0,180,255,0.12) 0%,transparent 40%),radial-gradient(circle at 80% 70%,rgba(138,43,226,0.1) 0%,transparent 40%);padding:20px;color:#e6f0ff;}
        。container{max-width:800px;margin:0 auto;}
        h1{text-align:center;color:#00e5ff;margin:20px 0;font-size:24px;text-shadow:0 0 8px #00a8cc,0 0 16px #0066aa;letter-spacing:2px;}
        。role-box{background:rgba(15,25,50,0.75);border:1px solid rgba(0,200,255,0.35);border-radius:14px;padding:22px;box-shadow:0 0 12px rgba(0,180,255,0.2),inset 0 0 8px rgba(0,150,220,0.1);margin-bottom:20px;text-align:center;backdrop-filter:blur(8px);}
        。set-box{margin:16px 0;}
        input{padding:11px 12px;width:130px;background:rgba(8,15,35,0.8);border:1px solid #00b4e6;border-radius:8px;font-size:15px;color:#ffffff;text-align:center;outline:none;transition:0.3s;}
        input:focus{box-shadow:0 0 10px #00b4e6;border-color:#00e5ff;}
        。card-box{background:rgba(12,20,45,0.7);border:1px solid rgba(138,43,226,0.4);border-radius:14px;box-shadow:0 0 14px rgba(138,43,226,0.25);padding:32px 26px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px;backdrop-filter:blur(6px);}
        。question-text{font-size:18px;line-height:1.9;color:#f0f8ff;text-align:center;margin-bottom:18px;}
        。en-question{font-size:15px;color:#a8d8ff;text-align:center;margin-top:6px;line-height:1.7;}
        。verse-box{background:rgba(0,90,140,0.25);border:1px solid rgba(0,200,255,0.3);border-radius:10px;padding:14px 16px;width:100%;font-size:14px;line-height:1.7;color:#b8e8ff;text-align:center;}
        。info-text{margin:14px 0;font-size:15px;color:#a0c8e8;text-align:center;}
        。self-name{font-size:26px;font-style:italic;font-weight:700;padding:8px 20px;border-radius:12px;background:linear-gradient(135deg,#ff4d94,#4cd9ff,#9b59ff);background-clip:text;-webkit-background-clip:text;color:transparent;text-shadow:0 0 10px rgba(76,217,255,0.5);margin:10px 0;}
        。prophet-desc{background:rgba(30,40,80,0.5);border:1px solid rgba(100,180,255,0.3);border-radius:10px;padding:12px 16px;margin:8px auto 16px;font-size:14px;line-height:1.6;color:#c0e0ff;text-align:center;max-width:90%;}
        。leader-tag{font-size:18px;color:#ff5e7d;font-weight:600;margin:12px 0;text-shadow:0 0 6px #c02942;text-align:center;}
        。common-btn{padding:12px 26px;background:linear-gradient(135deg,#0077be,#00b4e6);color:#fff;border:none;border-radius:30px;font-size:15px;cursor:pointer;transition:all 0.3s ease;margin:9px;box-shadow:0 0 8px rgba(0,180,255,0.4);}
        。common-btn:hover{background:linear-gradient(135deg,#0099e6,#00d0ff);box-shadow:0 0 14px rgba(0,210,255,0.6);transform:translateY(-2px);}
        。warn-tip{color:#ff6b6b;margin:10px 0;font-size:14px;}
        。note-box{background:rgba(15,22,48,0.7);border:1px solid rgba(0,180,255,0.3);border-radius:14px;padding:22px;box-shadow:0 0 12px rgba(0,150,220,0.18);backdrop-filter:blur(6px);}
        。note-title{font-size:17px;color:#66d9ff;margin-bottom:14px;text-shadow:0 0 4px #0088bb;}
        textarea{width:100%;height:145px;padding:13px;background:rgba(8,14,32,0.8);border:1px solid #0099cc;border-radius:10px;font-size:15px;color:#e6f7ff;resize:none;outline:none;transition:0.3s;}
        textarea:focus{box-shadow:0 0 10px #00a8e0;}
        。hide{display:none;}
        @media (max-width:480px){h1{font-size:21px;}.question-text{font-size:16px;}.en-question{font-size:13px;}.common-btn{margin:6px;width:75%;}}
    </style>
</head>
<body>
    <div class="container">
        <h1>赛博先知 · 团契智能讨论站</h1>
        <div class="role-box" id="rolePanel">
            <h3 style="color:#88d8ff;margin-bottom:15px;">选择你的身份终端</h3>
            <div class="warn-tip" id="leaderLimitTip"></div>
            <div class="set-box">
                <button class="common-btn" onclick="setLeader()">组长管控终端</button>
                <button class="common-btn" onclick="setMember()">成员观测终端</button>
            </div>
        </div>

        <div class="role-box hide" id="leaderSetPanel">
            <h3 style="color:#88d8ff;margin-bottom:15px;">组长主控操作台</h3>
            <div class="set-box">
                <p style="color:#b0d8f0;">录入本次小组成员总数</p>
                <input type="number" id="totalNumInput" min="2" max="20" placeholder="输入人数">
            </div>
            <div class="set-box">
                <button class="common-btn" onclick="confirmGroupNum()">确认锁定人数</button>
                <button class="common-btn" onclick="resignLeader()">卸任组长</button>
            </div>
            <div class="info-text" id="leaderNumShow"></div>
            <div class="set-box">
                <button class="common-btn hide" id="pickMemberBtn" onclick="randomPickProphet()">随机指派本轮带队先知</button>
            </div>
            <div class="info-text" id="pickResult"></div>
            <div class="set-box">
                <button class="common-btn hide" id="nextQBtn" onclick="switchNextQuestion()">结束本轮 · 切换议题</button>
            </div>
        </div>

        <div class="info-text hide" id="selfNameBox"></div>
        <div class="hide" id="prophetDescBox"></div>
        <div class="leader-tag hide" id="currentLeaderBox"></div>

        <div class="card-box hide" id="questionPanel">
            <p class="question-text" id="question">等待组长终端启动议题</p>
            <p class="en-question" id="enQuestion">Waiting for leader to start discussion</p>
            <div class="verse-box" id="verse">神圣经文同步加载中</div>
        </div>

        <div class="note-box hide" id="notePanel">
            <div class="note-title">个人思绪记录库</div>
            <textarea id="noteInput" placeholder="记录感悟、思考与观点..."></textarea>
        </div>
    </div>

    <script>
        // 先知角色数据
        const prophetInfo = [
            {name:"以赛亚",desc:"伟大先知，预言弥赛亚降临，忠心传达神旨意，唤醒世人悔改归向真理。"},
            {name:"耶利米",desc:"流泪先知，坚守使命直言劝谏，历经苦难仍不离不弃守护信仰本心。"},
            {name:"以西结",desc:"异象先知，看见神圣启示，描绘神圣国度，提醒众人坚守圣洁品行。"},
            {name:"但以理",desc:"智慧先知，身处异国坚守信仰，解梦明理，凭信心跨越重重试炼。"},
            {name:"何西阿",desc:"深情先知，以自身经历诠释慈爱包容，呼吁彼此相爱彼此宽恕。"},
            {name:"约珥",desc:"警醒先知，宣告审判与恩典，号召众人静心祷告诚心回转。"},
            {name:"阿摩司",desc:"正义先知，斥责不公恶行，倡导善良公义，守护世间美好准则。"},
            {name:"俄巴底亚",desc:"短言先知，明晰善恶结局，坚守立场，笃定追随光明正道。"},
            {name:"约拿",desc:"传道先知，顺从指引奔赴使命，学会包容接纳不同的灵魂。"},
            {name:"弥迦",desc:"平民先知，体恤底层众生，宣扬公平怜悯，践行真诚善意。"},
            {name:"那鸿",desc:"宣告先知，明辨善恶得失，坚信正义终将战胜一切黑暗。"},
            {name:"哈巴谷",desc:"沉思先知，疑惑中探寻真理，困境之中依旧笃定仰望信仰。"},
            {name:"西番雅",desc:"警醒先知，劝人远离虚妄，谦卑自省，守护纯粹初心。"},
            {name:"哈该",desc:"勉励先知，鼓舞众人重拾热忱，同心共建美好精神家园。"},
            {name:"撒迦利亚",desc:"异象先知，预见复兴景象，心怀盼望等候美好未来。"},
            {name:"玛拉基",desc:"末时先知，坚守信仰底线，坚守忠诚，维护真挚的心灵契约。"}
        ];

        // 讨论议题数据
       const questionList = [
            {q:"日常你是否会坚持定时祷告与研读圣经？",eq:"Do you stick to regular prayer and Bible reading daily?",v:"诗篇119:9 少年人用什么洁净他的行为呢？是要遵行你的话。"},
            {q:"内心感觉与神疏远的时候，你会采取怎样的行动？",eq:"What will you do when feeling distant from God?",v:"雅各书4:8 你们亲近神，神就必亲近你们。"},
            {q:"在你眼中，属灵生命成长成熟会有哪些具体表现？",eq:"What signs show mature spiritual growth in your view?",v:"加拉太书5:22-23 圣灵所结的果子，就是仁爱、喜乐、和平、忍耐。"},
            {q:"担心被同学议论，你会刻意隐藏自己基督徒的身份吗？",eq:"Will you hide your faith fearing classmates' judgment?",v:"提摩太前书4:12 不可叫人小看你年轻，总要在言行爱心上作信徒榜样。"},
            {q:"你真心相信上帝为你的人生预备了专属美好计划吗？",eq:"Do you truly believe God has unique plans for your life?",v:"耶利米书29:11 耶和华说，我知道向你们所怀赐平安的意念。"},
            {q:"参与教会聚会团契，对你的信仰和生活带来哪些改变？",eq:"How do church gatherings change your faith and daily life?",v:"希伯来书10:25 不可停止聚会，倒要彼此劝勉坚固信心。"},
            {q:"遭遇考试压力、情绪低落时，你第一时间会仰望神吗？",eq:"Do you turn to God first under stress and bad moods?",v:"腓立比书4:6-7 应当一无挂虑，凡事借着祷告祈求把需求告诉神。"},
            {q:"如何区分形式化的宗教礼仪和发自内心跟随基督？",eq:"How to tell empty rituals apart from sincere following Christ?",v:"撒母耳记上16:7 耶和华看人不像人看外貌，祂察看人的内心。"},
            {q:"成长过程里，你有没有产生过质疑圣经话语的时刻？",eq:"Have you ever doubted the words of the Bible while growing up?",v:"彼得后书1:21 圣经话语皆是人被圣灵感动，从神而来的启示。"},
            {q:"如果简短向同龄人介绍福音，你会用怎样的话语讲述？",eq:"How will you briefly share gospel with peers around you?",v:"约翰福音3:16 神爱世人，甚至将独生子赐下，使人信祂得永生。"},
            {q:"常常因为外貌样貌、学业成绩或是家庭条件心生自卑吗？",eq:"Do you feel inferior about appearance,grades and family background?",v:"诗篇139:14 我要称谢你，因我受造奇妙可畏，你的作为奇妙。"},
            {q:"作为基督徒，我们需要过度在意旁人对自己的评价看法吗？",eq:"Should Christians care too much about others' comments?",v:"加拉太书1:10 我们行事，只求神的喜悦，不求人的欢心。"},
            {q:"评判自我价值时，你更看重成绩人缘还是上帝眼中的定位？",eq:"Do you value grades popularity or God's view of yourself?",v:"以弗所书2:10 我们是神的工作，在基督里被创造，预备行善。"},
            {q:"爱惜自己与自私骄傲界限在哪，青少年该如何把握分寸？",eq:"What is the difference between self love and selfish arrogance?",v:"利未记19:18 不可报仇埋怨，总要爱人如己善待身边之人。"},
            {q:"是否曾因为身材、皮肤样貌等外在条件反感自己？",eq:"Have you disliked yourself due to figure and appearance?",v:"彼得前书3:4 长久温柔安静的内心，在神面前是极其宝贵的。"},
            {q:"明白身体是圣灵的殿，平日里你会怎样守护自身身体？",eq:"How do you protect your body knowing it's God's temple?",v:"哥林多前书6:19-20 身子乃是圣灵的殿，务要在身子上荣耀神。"},
            {q:"容易被网络精致人设裹挟，进而否定真实的自己吗？",eq:"Easily influenced by online perfect images and deny yourself?",v:"罗马书12:2 不要效法世俗潮流，心意更新活出全新样式。"},
            {q:"无论自身表现好坏，你都确信上帝始终无条件爱着你吗？",eq:"Believe God loves you unconditionally no matter your performance?",v:"罗马书5:8 我们作罪人时基督就为我们死，神的爱就此显明。"},
            {q:"自身存在的缺点毛病中，哪一点最让你内心困扰不安？",eq:"Which personal flaw troubles and disturbs you the most?",v:"约翰一书1:9 坦诚承认自身过犯，神必赦免洁净我们灵魂。"},
            {q:"青春成长是不断被否定打磨，还是被上帝精心塑造雕琢？",eq:"Growth is criticism or being shaped carefully by God?",v:"腓立比书1:6 神在我们心中开启善工，必会一直成全到底。"},
            {q:"繁重学业带来焦虑失眠，你懂得把重担交托给上帝吗？",eq:"Can you cast academic anxiety and stress onto God?",v:"彼得前书5:7 将一切忧虑卸给神，因为祂时刻顾念着我们。"},
            {q:"为了取得优异分数，你会选择作弊说谎违背本心吗？",eq:"Will you cheat and lie just to get better exam scores?",v:"出埃及记20:16 十诫诫命之中，明令禁止作假见证谎言。"},
            {q:"面对校园内卷竞争，基督徒应当拥有怎样的心态与态度？",eq:"What attitude should Christians hold towards fierce campus competition?",v:"歌罗西书3:23 凡事尽心去做，如同服侍主而非服侍世人。"},
            {q:"看见他人成绩优越出众，内心会不会生出嫉妒不甘的情绪？",eq:"Will you feel jealous when seeing outstanding classmates?",v:"加拉太书5:26 信徒不可贪图虚名，彼此嫉妒惹动纷争。"},
            {q:"在校生活里，基督徒该把握合群相处与分别为圣的尺度？",eq:"Balance getting along with others and being holy as Christians?",v:"约翰福音17:16 信徒不属这世俗世界，却仍活在人群之中。"},
            {q:"遭遇老师不公对待，你选择隐忍顺服还是冲动报复反抗？",eq:"Submit calmly or retaliate impetuously under unfair treatment?",v:"彼得前书2:23 受辱骂不还口，将一切审判全然交托主神。"},
            {q:"日常课堂小组交流中，你敢于分享自己的信仰立场吗？",eq:"Dare you share your faith standpoint in class discussions?",v:"马太福音5:16 让自身美好言行发光，将荣耀归赐天上父神。"},
            {q:"从信仰角度看待追星追网红，这样的爱好存在哪些利弊？",eq:"What are pros and cons of chasing celebrities from faith view?",v:"出埃及记20:3 除独一耶和华神以外，不可崇拜别的偶像。"},
            {q:"害怕异样眼光，你会在校园刻意隐瞒基督徒的身份吗？",eq:"Hide faith identity on campus fearing strange stares from others?",v:"马太福音10:33 人前不认基督，将来基督也必不认我们。"},
            {q:"坚守信仰行事做人，会不会让自己在校园里显得格格不入？",eq:"Does sticking faith make you feel isolated among schoolmates?",v:"哥林多前书1:27 神拣选平凡世人，使世俗智慧羞愧低头。"},
            {q:"结交朋友时，你优先看重样貌成绩人品还是共同信仰？",eq:"Prioritize looks grades character or shared faith when making friends?",v:"箴言13:20 与智慧善人结伴得益，同愚昧恶人相交受损。"},
            {q:"圣经禁止不同信仰同负一轭，你会和非信徒发展恋爱关系吗？",eq:"Will you date unbelievers knowing unequal yoke principle?",v:"哥林多后书6:14 信徒与不信之人不相配，不可一同负轭同行。"},
            {q:"同伴邀约烟酒熬夜玩乐，出于情谊你会选择跟随参与吗？",eq:"Follow peers to drink smoke and stay up late for friendship?",v:"箴言1:10 若是恶人诱惑引诱犯罪，我们应当果断拒绝远离。"},
            {q:"真心挚友的相处模式，在你的理解中具备哪些特质？",eq:"What qualities does true friendship possess in your understanding?",v:"箴言17:17 真挚友人时常彼此关爱，患难时刻彼此相伴扶持。"},
            {q:"好友犯下过错违背准则，你选择包庇隐瞒还是劝诫归正？",eq:"Cover friends' mistakes or persuade them to repent and correct?",v:"雅各书5:20 挽回迷失道路的弟兄，便能遮盖许多自身罪过。"},
            {q:"惧怕独处孤单，就勉强融入三观不合的圈子相处交往吗？",eq:"Force into incompatible groups just to avoid loneliness?",v:"诗篇27:10 即便至亲之人离弃，耶和华也必定收留庇护我们。"},
            {q:"经历朋友背叛伤害后，你还愿意真心信任身边其他人吗？",eq:"Still trust others sincerely after being betrayed by friends?",v:"诗篇118:8 投靠依靠耶和华主神，远远胜过依赖凡人朋友。"},
            {q:"和朋友产生观念分歧，你能否包容接纳彼此的不同想法？",eq:"Can you accept different opinions between you and friends?",v:"罗马书15:2 各人务要叫邻舍喜悦，彼此包容造就和睦关系。"},
            {q:"人际交往里，你习惯主动付出关怀还是被动接受陪伴？",eq:"Take initiative to care or accept company passively in social life?",v:"路加福音6:38 乐意施舍付出之人，必定会收获满满的回馈。"},
            {q:"距离远近分离，会不会慢慢淡化你和朋友之间的情谊？",eq:"Will distance gradually fade away friendship between companions?",v:"箴言18:24 真诚挚友紧密相连，患难之际不离不弃相伴。"},
            {q:"对比富足享乐与平淡安稳生活，你内心更向往哪一种人生？",eq:"Prefer wealthy pleasure or peaceful simple life in heart?",v:"诗篇37:16 少许本分拥有，强过恶人诸多丰盛财物。"},
            {q:"做事过程体验与最终结果收获，哪一样更被你看重？",eq:"Value process experience or final harvest results more deeply?",v:"传道书12:13 敬畏遵守神诫命，便是世人全部的本分意义。"},
            {q:"众人统一认可的观点，违背信仰本心时你还会坚持己见吗？",eq:"Stick to faith against public unanimous wrong views?",v:"使徒行传5:29 顺从神的话语旨意，胜于顺从世人命令要求。"},
            {q:"真正的自由是随心所欲放纵，还是顺服真理自我约束？",eq:"True freedom is indulgence or self discipline obeying truth?",v:"加拉太书5:13 自由不可用作放纵私欲，总要以爱心彼此服侍。"},
            {q:"努力奋斗的意义，是超越赶超他人还是完善成就自我？",eq:"Strive to surpass others or improve and fulfill yourself?",v:"腓立比书3:14 向着基督标杆直跑，争取上天召来的奖赏。"},
            {q:"心怀善良本心处事，是否需要设立底线防备恶意伤害？",eq:"Do kind hearts need bottom lines to guard against harm?",v:"马太福音10:16 灵巧像蛇驯良像鸽，智慧善良兼具防备之心。"},
            {q:"行走人生路途，有哪些原则底线是你至死都不会背弃的？",eq:"What principles will you never abandon throughout lifetime?",v:"箴言3:5-6 专心倚靠认定耶和华，祂必指引脚下前行道路。"},

        // 全局本地变量
        let isLeader = false;
        let groupTotal = 0;
        let currentQIndex = 0;
        let currentLeadProphet = "";
        let myProphetIndex = localStorage.getItem("myProphetIndex") ?? "";
        let hasGroupLeader = false;

        // 页面加载初始化
        window.onload = function(){
            allocateSelfName();
            refreshLeaderTip();
            refreshView();
        }

        // 分配个人先知身份
        function allocateSelfName(){
            if(myProphetIndex === ""){
                myProphetIndex = Math.floor(Math.random() * prophetInfo.length);
                localStorage。setItem("myProphetIndex", myProphetIndex);
            }
            const myInfo = prophetInfo[myProphetIndex];
            document.getElementById("selfNameBox").innerHTML = `<span class="self-name">${myInfo.name}</span>`;
            document.getElementById("prophetDescBox").innerHTML = `<div class="prophet-desc">先知简介：${myInfo.desc}</div>`;
        }

        // 组长状态提示更新
        function refreshLeaderTip(){
            const tipDom = document.getElementById("leaderLimitTip");
            tipDom.innerText = hasGroupLeader ? "⚠️ 当前小组已有组长，暂无法新增组长" : "";
        }

        // 页面视图刷新
        function refreshView(){
            if(groupTotal > 0){
                document.getElementById("leaderNumShow").innerText = `当前小组在册总人数：${groupTotal} 人`;
                document.getElementById("pickMemberBtn").classList.remove("hide");
                document.getElementById("nextQBtn").classList.remove("hide");
            }else{
                document.getElementById("pickMemberBtn").classList.add("hide");
                document.getElementById("nextQBtn").classList.add("hide");
            }
            document.getElementById("pickResult").innerText = currentLeadProphet ? `本轮议题带领先知：${currentLeadProphet}` : "";
            document.getElementById("currentLeaderBox").innerText = currentLeadProphet ? `本轮议题带领先知：${currentLeadProphet}` : "";
            loadQuestion();
        }

        // 选为组长
        function setLeader(){
            if(hasGroupLeader){
                alert("小组内已经存在组长，同一时间仅允许一位组长");
                return;
            }
            isLeader = true;
            hasGroupLeader = true;
            refreshLeaderTip();
            document.getElementById("rolePanel").classList.add("hide");
            document.getElementById("leaderSetPanel").classList.remove("hide");
        }

        // 选为成员
        function setMember(){
            isLeader = false;
            document.getElementById("rolePanel").classList.add("hide");
            showMainContent();
        }

        // 卸任组长
        function resignLeader(){
            if(!isLeader) return;
            isLeader = false;
            hasGroupLeader = false;
            refreshLeaderTip();
            document.getElementById("leaderSetPanel").classList.add("hide");
            document.getElementById("rolePanel").classList.remove("hide");
        }

        // 确认小组人数
        function confirmGroupNum(){
            let num = parseInt(document.getElementById("totalNumInput").value);
            if(isNaN(num) || num < 2 || num > 20){
                alert("请输入2-20区间有效成员数量");
                return;
            }
            groupTotal = num;
            showMainContent();
            refreshView();
        }

        // 随机选取带队先知
        function randomPickProphet(){
            let ranIdx = Math.floor(Math.random() * groupTotal);
            currentLeadProphet = prophetInfo[ranIdx % prophetInfo.length].name;
            refreshView();
        }

        // 切换下一个议题
        function switchNextQuestion(){
            currentQIndex++;
            if(currentQIndex >= questionList.length){
                alert("全部讨论议题已完结！");
                currentQIndex = questionList.length - 1;
            }
            currentLeadProphet = "";
            refreshView();
        }

        // 展示主体讨论内容
        function showMainContent(){
            document.getElementById("selfNameBox").classList.remove("hide");
            document.getElementById("prophetDescBox").classList.remove("hide");
            document.getElementById("currentLeaderBox").classList.remove("hide");
            document.getElementById("questionPanel").classList.remove("hide");
            document.getElementById("notePanel").classList.remove("hide");
        }

        // 加载议题文本
        function loadQuestion(){
            const item = questionList[currentQIndex];
            document.getElementById("question").innerText = item.q;
            document.getElementById("enQuestion").innerText = item.eq;
            document.getElementById("verse").innerText = item.v;
        }
    </script>
