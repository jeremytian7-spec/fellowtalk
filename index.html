<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博先知 · 团契智能讨论站</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Roboto, sans-serif;
        }
        body{
            min-height: 100vh;
            background: #080c1a;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0,180,255,0.12) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(138,43,226,0.1) 0%, transparent 40%);
            padding: 20px;
            color: #e6f0ff;
        }
        .container{
            max-width: 800px;
            margin: 0 auto;
        }
        h1{
            text-align: center;
            color: #00e5ff;
            margin: 20px 0;
            font-size: 24px;
            text-shadow: 0 0 8px #00a8cc, 0 0 16px #0066aa;
            letter-spacing: 2px;
        }
        .role-box{
            background: rgba(15,25,50,0.75);
            border: 1px solid rgba(0,200,255,0.35);
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 0 12px rgba(0,180,255,0.2), inset 0 0 8px rgba(0,150,220,0.1);
            margin-bottom: 20px;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        .set-box{
            margin: 16px 0;
        }
        input{
            padding: 11px 12px;
            width: 130px;
            background: rgba(8,15,35,0.8);
            border: 1px solid #00b4e6;
            border-radius: 8px;
            font-size: 15px;
            color: #ffffff;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }
        input:focus{
            box-shadow: 0 0 10px #00b4e6;
            border-color: #00e5ff;
        }
        .card-box{
            background: rgba(12,20,45,0.7);
            border: 1px solid rgba(138,43,226,0.4);
            border-radius: 14px;
            box-shadow: 0 0 14px rgba(138,43,226,0.25);
            padding: 32px 26px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            backdrop-filter: blur(6px);
        }
        .question-text{
            font-size: 18px;
            line-height: 1.9;
            color: #f0f8ff;
            text-align: center;
            margin-bottom: 18px;
        }
        .en-question{
            font-size: 15px;
            color: #a8d8ff;
            text-align: center;
            margin-top: 6px;
            line-height: 1.7;
        }
        .verse-box{
            background: rgba(0,90,140,0.25);
            border: 1px solid rgba(0,200,255,0.3);
            border-radius: 10px;
            padding: 14px 16px;
            width: 100%;
            font-size: 14px;
            line-height: 1.7;
            color: #b8e8ff;
            text-align: center;
        }
        .info-text{
            margin: 14px 0;
            font-size: 15px;
            color: #a0c8e8;
            text-align: center;
        }
        /* 先知代号样式：放大、斜体、彩色渐变背景 */
        .self-name{
            font-size: 26px;
            font-style: italic;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 12px;
            background: linear-gradient(135deg,#ff4d94,#4cd9ff,#9b59ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(76,217,255,0.5);
            margin: 10px 0;
        }
        /* 先知简介卡片 居中优化 */
        .prophet-desc{
            background: rgba(30,40,80,0.5);
            border: 1px solid rgba(100,180,255,0.3);
            border-radius: 10px;
            padding: 12px 16px;
            margin: 8px auto 16px;
            font-size: 14px;
            line-height: 1.6;
            color: #c0e0ff;
            text-align: center;
            max-width: 90%;
        }
        /* 本轮带领人醒目样式 */
        .leader-tag{
            font-size: 18px;
            color: #ff5e7d;
            font-weight: 600;
            margin: 12px 0;
            text-shadow: 0 0 6px #c02942;
            text-align: center;
        }
        .common-btn{
            padding: 12px 26px;
            background: linear-gradient(135deg,#0077be,#00b4e6);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 9px;
            box-shadow: 0 0 8px rgba(0,180,255,0.4);
        }
        .common-btn:hover{
            background: linear-gradient(135deg,#0099e6,#00d0ff);
            box-shadow: 0 0 14px rgba(0,210,255,0.6);
            transform: translateY(-2px);
        }
        .note-box{
            background: rgba(15,22,48,0.7);
            border: 1px solid rgba(0,180,255,0.3);
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 0 12px rgba(0,150,220,0.18);
            backdrop-filter: blur(6px);
        }
        .note-title{
            font-size: 17px;
            color: #66d9ff;
            margin-bottom: 14px;
            text-shadow: 0 0 4px #0088bb;
        }
        textarea{
            width: 100%;
            height: 145px;
            padding: 13px;
            background: rgba(8,14,32,0.8);
            border: 1px solid #0099cc;
            border-radius: 10px;
            font-size: 15px;
            color: #e6f7ff;
            resize: none;
            outline: none;
            transition: 0.3s;
        }
        textarea:focus{
            box-shadow: 0 0 10px #00a8e0;
        }
        .hide{
            display: none;
        }
        @media (max-width: 480px){
            h1{font-size: 21px;}
            .question-text{font-size: 16px;}
            .en-question{font-size: 13px;}
            .common-btn{margin:6px;width:75%;}
            .self-name{font-size:22px;}
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>赛博先知 · 团契智能讨论站</h1>

        <!-- 初始身份选择面板 -->
        <div class="role-box" id="rolePanel">
            <h3 style="color:#88d8ff;margin-bottom:15px;">选择你的身份终端</h3>
            <div class="set-box">
                <button class="common-btn" onclick="setLeader()">组长管控终端</button>
                <button class="common-btn" onclick="setMember()">成员观测终端</button>
            </div>
        </div>

        <!-- 组长专属操作面板 -->
        <div class="role-box hide" id="leaderSetPanel">
            <h3 style="color:#88d8ff;margin-bottom:15px;">组长主控操作台</h3>
            <div class="set-box">
                <p style="color:#b0d8f0;">录入本次小组成员总数</p>
                <input type="number" id="totalNumInput" min="2" max="20" placeholder="输入人数">
            </div>
            <div class="set-box">
                <button class="common-btn" onclick="confirmGroupNum()">确认锁定人数</button>
            </div>
            <!-- 仅保留单处人数显示 -->
            <div class="info-text" id="leaderNumShow"></div>
            <div class="set-box">
                <button class="common-btn hide" id="pickMemberBtn" onclick="randomPickProphet()">随机指派本轮带队先知</button>
            </div>
            <div class="info-text" id="pickResult"></div>
            <div class="set-box">
                <button class="common-btn hide" id="nextQBtn" onclick="switchNextQuestion()">结束本轮 · 切换议题</button>
            </div>
        </div>

        <!-- 个人专属先知身份+简介 -->
        <div class="info-text hide" id="selfNameBox"></div>
        <div class="hide" id="prophetDescBox"></div>
        <!-- 全局本轮带队人公示，组员组长均可看见 -->
        <div class="leader-tag hide" id="currentLeaderBox"></div>

        <!-- 议题经文展示区域 -->
        <div class="card-box hide" id="questionPanel">
            <p class="question-text" id="question">等待组长终端启动议题</p>
            <p class="en-question" id="enQuestion">Waiting for leader to start discussion</p>
            <div class="verse-box" id="verse">神圣经文同步加载中</div>
        </div>

        <!-- 个人笔记记录面板 -->
        <div class="note-box hide" id="notePanel">
            <div class="note-title">个人思绪记录库</div>
            <textarea id="noteInput" placeholder="记录感悟、思考与观点..." oninput="saveNote()"></textarea>
        </div>
    </div>

    <script>
        // 先知名字+简短事迹简介库
        const prophetInfo = [
            {name:"以赛亚",desc:"伟大先知，预言弥赛亚降临，忠心传达神旨意，唤醒世人悔改归向真理。"},
            {name:"耶利米",desc:"流泪先知，坚守使命直言劝谏，历经苦难仍不离不弃守护信仰本心。"},
            {name:"以西结",desc:"异象先知，看见神圣启示，描绘神圣国度，提醒众人坚守圣洁品行。"},
            {name:"但以理",desc:"智慧先知，身处异国坚守信仰，解梦明理，凭信心跨越重重试炼。"},
            {name:"何西阿",desc:"深情先知，以自身经历诠释慈爱包容，呼吁彼此相爱彼此宽恕。"},
            {name:"约珥",desc:"警醒先知，宣告审判与恩典，号召众人静心祷告诚心回转。"},
            {name:"阿摩司",desc:"正义先知，斥责不公恶行，倡导善良公义，守护世间美好准则。"},
            {name:"俄巴底亚",desc:"短言先知，明晰善恶结局，坚守立场，笃定追随光明正道。"},
            {name:"约拿",desc:"传道先知，顺从指引奔赴使命，学会包容接纳不同的灵魂。"},
            {name:"弥迦",desc:"平民先知，体恤底层众生，宣扬公平怜悯，践行真诚善意。"},
            {name:"那鸿",desc:"宣告先知，明辨善恶得失，坚信正义终将战胜一切黑暗。"},
            {name:"哈巴谷",desc:"沉思先知，疑惑中探寻真理，困境之中依旧笃定仰望信仰。"},
            {name:"西番雅",desc:"警醒先知，劝人远离虚妄，谦卑自省，守护纯粹初心。"},
            {name:"哈该",desc:"勉励先知，鼓舞众人重拾热忱，同心共建美好精神家园。"},
            {name:"撒迦利亚",desc:"异象先知，预见复兴景象，心怀盼望等候美好未来。"},
            {name:"玛拉基",desc:"末时先知，坚守信仰底线，坚守忠诚，维护真挚的心灵契约。"}
        ];

        let isLeader = false;
        let groupTotal = 0;
        let currentQIndex = 0;
        let currentLeadProphet = "";
        let myProphetIndex = localStorage.getItem("myProphetIndex") ?? "";
        let myInfo;

        // 自动分配专属先知代号与简介
        function allocateSelfName(){
            if(myProphetIndex === ""){
                let randIdx = Math.floor(Math.random() * prophetInfo.length);
                myProphetIndex = randIdx;
                localStorage.setItem("myProphetIndex",randIdx);
            }
            myInfo = prophetInfo[myProphetIndex];
            document.getElementById("selfNameBox").innerHTML =
                `<span class="self-name">${myInfo.name}</span>`;
            document.getElementById("prophetDescBox").innerHTML =
                `<div class="prophet-desc">先知简介：${myInfo.desc}</div>`;
        }

        // 身份终端切换
        function setLeader(){
            isLeader = true;
            document.getElementById("rolePanel").classList.add("hide");
            document.getElementById("leaderSetPanel").classList.remove("hide");
            allocateSelfName();
        }
        function setMember(){
            isLeader = false;
            document.getElementById("rolePanel").classList.add("hide");
            allocateSelfName();
            showMainContent();
        }

        // 组长锁定小组人数
        function confirmGroupNum(){
            let num = parseInt(document.getElementById("totalNumInput").value);
            if(isNaN(num) || num < 2 || num > 20){
                alert("请输入2-20区间有效成员数量");
                return;
            }
            groupTotal = num;
            document.getElementById("leaderNumShow").innerText = `当前小组在册总人数：${groupTotal} 人`;
            document.getElementById("pickMemberBtn").classList.remove("hide");
            document.getElementById("nextQBtn").classList.remove("hide");
            showMainContent();
        }

        // 随机抽取本轮带队先知
        function randomPickProphet(){
            let ranIdx = Math.floor(Math.random() * groupTotal);
            currentLeadProphet = prophetInfo[ranIdx % prophetInfo.length].name;
            let tip = `本轮议题带领先知：${currentLeadProphet}`;
            document.getElementById("pickResult").innerText = tip;
            document.getElementById("currentLeaderBox").innerText = tip;
        }

        // 组长切换下一个讨论议题
        function switchNextQuestion(){
            currentQIndex++;
            if(currentQIndex >= questionList.length){
                alert("全部讨论议题已完结！");
                currentQIndex = questionList.length - 1;
            }
            loadQuestion();
            currentLeadProphet = "";
            document.getElementById("pickResult").innerText = "";
            document.getElementById("currentLeaderBox").innerText = "";
        }

        // 加载主讨论界面
        function showMainContent(){
            document.getElementById("selfNameBox").classList.remove("hide");
            document.getElementById("prophetDescBox").classList.remove("hide");
            document.getElementById("currentLeaderBox").classList.remove("hide");
            document.getElementById("questionPanel").classList.remove("hide");
            document.getElementById("notePanel").classList.remove("hide");
            loadQuestion();
            let oldNote = localStorage.getItem("groupNote") || "";
            document.getElementById("noteInput").value = oldNote;
        }

        // 读取双语议题与经文
        function loadQuestion(){
            let item = questionList[currentQIndex];
            document.getElementById("question").innerText = item.q;
            document.getElementById("enQuestion").innerText = item.eq;
            document.getElementById("verse").innerText = item.v;
        }

        // 本地存储个人笔记
        function saveNote(){
            let val = document.getElementById("noteInput").value;
            localStorage.setItem("groupNote", val);
        }

        // 中英双语题库 中文在上 英文在下
        const questionList = [
            {
                q:"近期生活里，哪些经历让你真切感受到上帝的守护与带领？",
                eq:"Which experiences in recent life make you truly feel God's protection and guidance?",
                v:"箴言3:5-6 你要专心仰赖耶和华，不可倚靠自己的聪明，在你一切所行的事上都要认定他，他必指引你的路。"
            },
            {
                q:"信仰在你的三观塑造中起到了怎样的作用？",
                eq:"What role does faith play in shaping your outlook on life?",
                v:"罗马书12:2 不要效法这个世界，只要心意更新而变化，叫你们察验何为神的善良、纯全、可喜悦的旨意。"
            },
            {
                q:"面对学业压力、升学迷茫时，你如何借着信仰调整自身状态？",
                eq:"How do you adjust yourself with faith when facing academic pressure and confusion?",
                v:"腓立比书4:6-7 应当一无挂虑，只要凡事借着祷告、祈求和感谢，将你们所要的告诉神。神所赐出人意外的平安，必在基督耶稣里保守你们的心怀意念。"
            },
            {
                q:"步入青年阶段，坚守信仰对你而言最大的阻碍是什么？",
                eq:"What is the biggest obstacle for you to stick to faith in youth?",
                v:"彼得前书5:9 务要谨守，警醒。因为你们的仇敌魔鬼，如同吼叫的狮子，遍地游行，寻找可吞吃的人。"
            },
            {
                q:"忙碌的日常中，你会以何种方式维系自己与上帝的联结？",
                eq:"How do you maintain your connection with God in busy daily life?",
                v:"诗篇16:8 我将耶和华常摆在我面前，因他在我右边，我便不至摇动。"
            },
            {
                q:"你认为祷告是形式仪式，还是心灵与上帝的沟通？谈谈你的看法",
                eq:"Do you think prayer is a ritual or spiritual communication with God?",
                v:"耶利米书29:12 你们呼求我，祷告我，我就应允你们。"
            },
            {
                q:"诸多信仰习惯里，哪一项对你的生命成长帮助最大？",
                eq:"Which faith habit helps you grow spiritually the most?",
                v:"约书亚记1:8 这律法书不可离开你的口，总要昼夜思想，好使你谨守遵行书上所写的一切话。"
            },
            {
                q:"上帝审视人的内心，你觉得自身哪些品格最蒙上帝喜悦？",
                eq:"God looks at the heart, what qualities of yours please God most?",
                v:"撒母耳记上16:7 耶和华看人不像人看人，人是看外貌，耶和华是看内心。"
            },
            {
                q:"成长路上你是否出现过信仰疑惑，又是如何跨过内心动摇的？",
                eq:"Have you ever doubted faith and how did you get through it?",
                v:"马可福音9:24 我信，但我信不足，求主帮助！"
            },
            {
                q:"结合自身认知，你认为成熟的基督徒青年该具备哪些特质？",
                eq:"What qualities should a mature young Christian possess?",
                v:"约翰一书2:16 因为凡世界上的事，就像肉体的情欲、眼目的情欲，并今生的骄傲，都不是从父来的。"
            },
            {
                q:"站在人生分叉路口，你期望信仰指引自己成为怎样的人？",
                eq:"What kind of person do you want faith to guide you to become?",
                v:"腓立比书3:13-14 忘记背后，努力面前的，向着标竿直跑，要得神在基督耶稣里从上面召我来得的奖赏。"
            },
            {
                q:"日常研读圣经，最难坚持或是最难理解的部分是什么？",
                eq:"What part of Bible is hardest to persist in or understand?",
                v:"诗篇119:105 你的话是我脚前的灯，是我路上的光。"
            },
            {
                q:"人生遭遇挫折困境，你如何理解上帝允许苦难存在的意义？",
                eq:"How do you understand the meaning of hardships permitted by God?",
                v:"罗马书8:28 我们晓得万事都互相效力，叫爱神的人得益处，就是按他旨意被召的人。"
            },
            {
                q:"自评当下的信仰信心程度，哪些事情会影响你的信心强弱？",
                eq:"Evaluate your current faith level, what affects your faith?",
                v:"希伯来书11:1 信就是所望之事的实底，是未见之事的确据。"
            },
            {
                q:"回望这段时光，细数三件你发自内心感恩上帝的事",
                eq:"Look back and share three things you sincerely thank God for",
                v:"帖撒罗尼迦前书5:18 凡事谢恩，因为这是神在基督耶稣里向你们所定的旨意。"
            }
        ];
    </script>
</body>
</html>
